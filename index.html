<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DriveTalk Test Button</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #111827;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 500px;
      text-align: center;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 20px;
    }

    p {
      font-size: 1rem;
      margin-bottom: 30px;
      color: #d1d5db;
      line-height: 1.5;
    }

    #recordButton {
      width: 100%;
      height: 220px;
      border: none;
      border-radius: 30px;
      background: #22c55e;
      color: white;
      font-size: 2rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      transition: transform 0.15s ease, background 0.2s ease;
      touch-action: manipulation;
    }

    #recordButton:active {
      transform: scale(0.98);
      background: #16a34a;
    }

    #status {
      margin-top: 25px;
      font-size: 1.2rem;
      min-height: 40px;
      color: #facc15;
    }

    #transcript {
      margin-top: 20px;
      background: #1f2937;
      border-radius: 16px;
      padding: 18px;
      min-height: 140px;
      text-align: left;
      font-size: 1rem;
      line-height: 1.5;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>DriveTalk Test</h1>
    <p>
      Tap the large green button once, then speak your delivery note.
      This test version will convert your speech into text.
    </p>

    <button id="recordButton">🎤 TAP TO RECORD</button>

    <div id="status">Ready</div>

    <div id="transcript">
      Your transcribed note will appear here...
    </div>
  </div>

  <script>
    const button = document.getElementById('recordButton');
    const status = document.getElementById('status');
    const transcriptBox = document.getElementById('transcript');

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
      status.innerText = 'Speech recognition not supported on this device/browser.';
      button.disabled = true;
    } else {
      const recognition = new SpeechRecognition();

      recognition.lang = 'en-GB';
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;

      button.addEventListener('click', () => {
        recognition.start();
        status.innerText = 'Listening...';

        button.style.background = '#dc2626';
        button.innerText = '🔴 RECORDING';
      });

     recognition.onresult = (event) => {
  const text = event.results[0][0].transcript;
  transcriptBox.innerText = text;
  status.innerText = 'Note captured successfully';

  button.style.background = '#22c55e';
  button.innerText = '🎤 TAP TO RECORD';

  fetch('https://hook.eu2.make.com/2d7l8iedu4d4seyknf19oniir2geuu7o', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      note: text,
      timestamp: new Date().toLocaleString('en-GB')
    })
  });
};

      recognition.onerror = (event) => {
        status.innerText = 'Error: ' + event.error;

        button.style.background = '#22c55e';
        button.innerText = '🎤 TAP TO RECORD';
      };

      recognition.onend = () => {
        if (status.innerText === 'Listening...') {
          status.innerText = 'Stopped listening';
        }

        button.style.background = '#22c55e';
        button.innerText = '🎤 TAP TO RECORD';
      };
    }
  </script>
</body>
</html>
